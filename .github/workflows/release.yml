name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BINARY_NAME="cb"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="cb.exe"
          fi
          
          # Compress binary size with ldflags
          go build -ldflags="-s -w" -o "dist/${BINARY_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}" .
          
          # If windows, make sure name has .exe at the end of the full path
          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv "dist/${BINARY_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}" "dist/cb-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten directory structure
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum cb-* > checksums.txt
          ls -l

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
